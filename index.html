<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>githhub issu tracker</title>
    <!-- Tailwind css and daisy UI -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font setup -->
     <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

<style>
    *{
         font-family: "Geist", sans-serif;

     }
    
</style>



</head>
<body>

  <!-- Log in section  -->
<section class="min-h-screen max-w-md bg-base-200 mx-auto">
    <div class="flex items-center justify-center min-h-screen bg-base-200">
  <div class="card w-96 bg-base-100 shadow-xl">
    <div class="card-body">
      <!-- Logo Section -->
      <div class="flex justify-center mb-4">
        <img src="assets/github-logo.png" alt="Logo" class="w-16 h-16" />
      </div>

      <h2 class="card-title justify-center">GitHub Issues Tracker</h2>
      <p class="text-center">Sign in to manage your issues</p>

      <!-- Username -->
      <div class="form-control mt-4">
        <label class="label font-bold">User Name</label>
        <input id="input-username" type="text" placeholder="Enter Username" class="input input-bordered" value="admin" />
      </div>

      <!-- Password -->
      <div class="form-control mt-4">
        <label class="label font-bold">Password</label>
        <input id="input-password" type="password" placeholder="Enter Password" class="input input-bordered" value="admin123" />
      </div>
        <button id="btn-sign-in" class="btn btn-primary rounded-2xl mt-4 ">Sign In</button>
      
      <div class="divider">OR</div>

      <!-- Demo Credentials -->
      <div class="text-center">
        <p class="font-bold">Demo Credentials:</p>
        <p>Username: admin</p>
        <p>Password: admin123</p>
      </div>
    </div>
  </div>
</div>
</section>


    <!-- connect js file -->
     <script src="js/sign-in.js"></script>
</body>
</html>
